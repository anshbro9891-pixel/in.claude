<!doctype html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>INCLAW Workspace</title>
<link rel="icon" href="assets/favicon.ico"/>
<link rel="stylesheet" href="css/global.css"/>
<link rel="stylesheet" href="css/workspace.css"/>
<script src="https://js.puter.com/v2/"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head><body class="grid-bg">
<div id="intro-overlay" class="intro-overlay"><svg width="140" height="140" viewBox="0 0 200 200" fill="none"><path id="intro-hex" d="M60 25h80l40 75-40 75H60L20 100z" stroke="white" stroke-width="4"/><path id="intro-brain" d="M70 92c0-14 11-25 25-25 7 0 13 3 18 7 5-4 11-7 18-7 14 0 25 11 25 25 0 14-11 25-25 25h-61V92z" fill="#FF2D55"/></svg><h1 id="intro-title" class="intro-title"></h1><p id="intro-tagline" class="intro-tagline">The AI That Thinks, Codes, Conquers.</p></div>
<div class="site-shell"><main>
<section class="workspace">
  <aside class="panel file-panel">
    <h3>Files</h3>
    <div style="display:flex;gap:6px;margin:8px 0 10px"><button id="new-file" class="btn btn-gradient">New File</button><button id="new-folder" class="btn btn-gradient">New Folder</button></div>
    <div class="file-tree" id="file-tree"></div>
  </aside>

  <section class="panel editor-panel">
    <div class="toolbar">
      <input value="inclaw-project" style="padding:9px;border-radius:10px;border:1px solid var(--border-glass);background:#0f0f0f;color:#fff"/>
      <select id="template" style="padding:9px;border-radius:10px;border:1px solid var(--border-glass);background:#0f0f0f;color:#fff">
        <option>Static HTML</option><option>React</option><option>Express</option><option>FastAPI</option><option>Python Script</option>
      </select>
      <button class="btn btn-solid">Run</button><button class="btn btn-gradient">Deploy to Netlify</button><button class="btn btn-gradient">Download ZIP</button><button class="btn btn-gradient">Share</button>
    </div>
    <div id="editor"></div>
    <div class="bottom-tabs"><strong>Terminal</strong> | Preview | Console<br/><small>$ inclaw run --template static-html</small><iframe title="preview" style="width:100%;height:130px;border:1px solid var(--border-glass);border-radius:10px;background:white" srcdoc="<h3 style='font-family:sans-serif'>Live Preview</h3>"></iframe></div>
  </section>

  <aside class="panel assistant-panel">
    <div style="padding:10px"><strong>AI Assistant</strong></div>
    <div class="assistant-actions">
      <button class="btn btn-gradient" data-quick="Explain this code">Explain this code</button>
      <button class="btn btn-gradient" data-quick="Fix bugs">Fix bugs</button>
      <button class="btn btn-gradient" data-quick="Add comments">Add comments</button>
      <button class="btn btn-gradient" data-quick="Optimize">Optimize</button>
      <button class="btn btn-gradient" data-quick="Write tests">Write tests</button>
      <select id="ide-model" style="width:100%;padding:8px;border-radius:10px;border:1px solid var(--border-glass);background:#0f0f0f;color:#fff"><option value="auto">Auto</option><option value="deepseek-coder">DeepSeek Coder</option><option value="deepseek-r1">DeepSeek R1</option><option value="llama-3.3-70b">Llama 3.3 70B</option></select>
    </div>
    <div id="ide-chat"></div>
    <div style="padding:10px"><input id="ide-input" placeholder="Ask INCLAW about this project"/><button id="ide-send" class="btn btn-solid" style="margin-top:8px;width:100%">Send</button><small id="ide-status">Ready</small></div>
  </aside>
</section>
</main></div>
<script type="module">
import { initSharedLayout, initRevealAnimations } from './js/navbar.js';
import { initLogoIntro } from './js/logo-animation.js';
import { initWorkspace } from './js/ide.js';
initSharedLayout(); initRevealAnimations(); initLogoIntro(); initWorkspace();
</script>
</body></html>
